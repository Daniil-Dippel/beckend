services:
  - type: web
    name: catalog-backend
    runtime: python

    buildCommand: pip install -r requirements.txt

    startCommand: gunicorn run:app

    envVars:
      - key: SECRET_KEY
        generateValue: true

      - key: FLASK_DEBUG
        value: "0"

      - key: SESSION_COOKIE_SECURE
        value: "1"

      - key: SESSION_COOKIE_SAMESITE
        value: "None"

      - key: DATABASE_URL
        fromDatabase:
          name: catalog-db
          property: connectionString

databases:
  - name: catalog-db